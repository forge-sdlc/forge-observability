forge_observability:
  target: dev
  outputs:
    dev:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8123') | int }}"
      database: "{{ env_var('CLICKHOUSE_DATABASE', 'default') }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'forge') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'forge') }}"
      secure: false
