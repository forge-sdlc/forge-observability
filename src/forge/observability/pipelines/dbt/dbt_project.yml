name: forge_observability
version: 0.1.0
profile: forge_observability

model-paths: ["models"]
macro-paths: ["macros"]
packages-install-path: "../../../../../.dbt/dbt_packages"

models:
  forge_observability:
    staging:
      +materialized: view
    silver:
      +materialized: view

vars:
  # Lists which bronze source names are available in the datastore.
  # The worker overrides this at runtime via --vars based on actual table presence.
  # When running dbt directly, set this to match what's loaded in your datastore.
  available_sources:
    - human_interactions
    - jira_tickets
    - llm_traces
