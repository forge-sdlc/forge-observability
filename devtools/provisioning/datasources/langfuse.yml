apiVersion: 1

datasources:
  - name: Langfuse
    type: forge-langfuse-datasource
    uid: langfuse
    url: "http://${LANGFUSE_HOST}:${LANGFUSE_PORT}"
    editable: false
    basicAuth: true
    basicAuthUser: "${LANGFUSE_PUBLIC_KEY}"
    secureJsonData:
      basicAuthPassword: "${LANGFUSE_SECRET_KEY}"
